name: Argus CVE Monitor
 
on:
  # 스케줄 일시 중지 — Groq/Gemini 일일 한도(TPD/RPD) 보존을 위해 자동 실행을 멈춘다.
  # 자산 기준 티어링 반영·테스트 후 아래 두 줄 주석을 해제해 재개.
  # schedule:
  #   - cron: '18 * * * *'  # 매시 18분 자동 실행
  workflow_dispatch:  # 수동 실행 가능 (테스트용으로 유지)
 
permissions:
  contents: write
  issues: write

# 동시 실행 방지 — 백로그 해소 중 실행이 길어져 다음 정시 실행과 겹치면
# 워터마크 경합·중복 처리가 생길 수 있다. 실행 중이면 다음 실행은 대기(취소 아님).
concurrency:
  group: argus-pipeline
  cancel-in-progress: false
 
jobs:
  argus-run:
    runs-on: ubuntu-latest
    # 파이프라인은 soft_deadline_minutes(38분)에 스스로 마무리·워터마크 저장 후 종료한다.
    # 이 값은 그게 실패했을 때의 최후 안전장치 (셋업+export+commit 여유 포함).
    timeout-minutes: 45
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 룰셋/인덱스 tarball·CSV 디스크 캐시 (일 단위 키) — 매시간 재다운로드 제거
      - name: Cache rulesets
        uses: actions/cache@v4
        with:
          path: .cache/rulesets
          key: rulesets-${{ github.run_id }}
          restore-keys: |
            rulesets-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Argus CVE pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/main.py
 
      # if: always() — 파이프라인이 중간에 실패해도, 이미 정상 저장된 워터마크/대시보드
      # 데이터는 커밋한다 (워터마크 파일은 _main 말미에만 쓰이므로 잘못 전진할 일 없음).
      - name: Export dashboard data
        if: always()
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/export_dashboard_data.py

      - name: Commit and push dashboard data
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cves.json docs/data/stats.json docs/data/pipeline_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dashboard data [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
