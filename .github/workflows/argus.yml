name: Argus CVE Monitor
 
on:
  schedule:
    - cron: '18 * * * *'  # 매시 18분 자동 실행
  workflow_dispatch:  # 수동 실행 가능
 
permissions:
  contents: write
  issues: write
 
jobs:
  argus-run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 룰셋/인덱스 tarball·CSV 디스크 캐시 (일 단위 키) — 매시간 재다운로드 제거
      - name: Cache rulesets
        uses: actions/cache@v4
        with:
          path: .cache/rulesets
          key: rulesets-${{ github.run_id }}
          restore-keys: |
            rulesets-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Argus CVE pipeline
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python src/main.py
 
      - name: Export dashboard data
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python src/export_dashboard_data.py
 
      - name: Commit and push dashboard data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/cves.json docs/data/stats.json docs/data/pipeline_state.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update dashboard data [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push
          fi
