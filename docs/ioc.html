<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Argus - IOC Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="container header-inner">
      <a href="ioc.html" class="logo">
        <span class="logo-icon">&#128737;</span>
        <span>Argus Dashboard</span>
      </a>
      <nav class="nav">
        <a href="ioc.html" class="active">IOC</a>
        <a href="cve.html">CVE</a>
        <a href="blacklist.html">Blacklist IP</a>
      </nav>
      <span class="updated-at" id="updated-time">-</span>
    </div>
  </header>

  <main class="container">
    <!-- Stat Cards -->
    <div class="stat-cards">
      <div class="stat-card">
        <div class="label">Total IOCs</div>
        <div class="value info" id="stat-total">-</div>
      </div>
      <div class="stat-card">
        <div class="label">CVE</div>
        <div class="value" style="color:var(--info)" id="stat-cve">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Malicious IP</div>
        <div class="value" style="color:var(--high)" id="stat-ip">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Detection Rules</div>
        <div class="value" style="color:var(--low)" id="stat-rule">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Malicious URL</div>
        <div class="value" style="color:#E040FB" id="stat-url">-</div>
      </div>
      <div class="stat-card">
        <div class="label">Malware Hash</div>
        <div class="value" style="color:#FF5252" id="stat-hash">-</div>
      </div>
    </div>

    <!-- Charts Row -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:24px;">
      <div class="chart-section">
        <h3>IOC by Type</h3>
        <div id="type-dist" style="padding-top:16px;"></div>
      </div>
      <div class="chart-section">
        <h3>Risk Distribution</h3>
        <div id="risk-dist" style="padding-top:16px;"></div>
      </div>
      <div class="chart-section">
        <h3>Tags</h3>
        <div id="tag-cloud" style="padding-top:12px;"></div>
      </div>
    </div>

    <!-- Type Tabs -->
    <div class="type-tabs" style="display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;">
      <button class="type-tab active" data-type="" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        All <span id="tab-count-all" style="font-size:11px;opacity:.6;">-</span>
      </button>
      <button class="type-tab" data-type="cve" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        &#128737; CVE <span id="tab-count-cve" style="font-size:11px;opacity:.6;">-</span>
      </button>
      <button class="type-tab" data-type="ip" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        &#127760; IP <span id="tab-count-ip" style="font-size:11px;opacity:.6;">-</span>
      </button>
      <button class="type-tab" data-type="rule" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        &#128269; Rule <span id="tab-count-rule" style="font-size:11px;opacity:.6;">-</span>
      </button>
      <button class="type-tab" data-type="url" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        &#128279; URL <span id="tab-count-url" style="font-size:11px;opacity:.6;">-</span>
      </button>
      <button class="type-tab" data-type="hash" style="display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:var(--card-bg);color:var(--text);cursor:pointer;font-size:13px;transition:all .15s;">
        &#129516; Hash <span id="tab-count-hash" style="font-size:11px;opacity:.6;">-</span>
      </button>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <input type="text" class="search-input" id="search-input" placeholder="Search IOC (CVE ID, IP, keyword...)">
      <div class="severity-filters">
        <button class="severity-btn active" data-severity="Critical">Critical</button>
        <button class="severity-btn active" data-severity="High">High</button>
        <button class="severity-btn active" data-severity="Medium">Medium</button>
        <button class="severity-btn active" data-severity="Low">Low</button>
      </div>
      <button class="export-btn" id="export-csv-btn" title="Export filtered IOCs as CSV">CSV</button>
      <button class="export-btn" id="export-json-btn" title="Export filtered IOCs as JSON">JSON</button>
    </div>

    <!-- Loading -->
    <div class="loading" id="loading">Loading...</div>

    <!-- Table -->
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Type</th>
            <th onclick="sortBy('indicator')">Indicator</th>
            <th>Title</th>
            <th onclick="sortBy('risk')">Risk</th>
            <th onclick="sortBy('score')">Score</th>
            <th>Tags</th>
            <th onclick="sortBy('date')">Date</th>
          </tr>
        </thead>
        <tbody id="ioc-table-body"></tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <button id="prev-btn" onclick="changePage(-1)">&laquo; Prev</button>
      <span class="page-info" id="page-info">-</span>
      <button id="next-btn" onclick="changePage(1)">Next &raquo;</button>
    </div>
  </main>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modal-title">IOC Detail</h2>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
    </div>
  </div>

  <script src="js/chart.js"></script>
  <script src="js/ioc-dashboard.js"></script>
</body>
</html>
